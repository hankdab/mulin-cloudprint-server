<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>睦邻云印 - 管理后台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #38bdf8;
      --bg: #0f0f23;
      --bg-card: #1a1a3e;
      --bg-card-hover: #22224a;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: #2d2d5e;
      --glow: rgba(99, 102, 241, 0.3);
      --radius: 12px;
    }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* ========== Toast 通知 ========== */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast {
      background: rgba(26, 26, 62, 0.95); backdrop-filter: blur(12px);
      border: 1px solid var(--primary); border-radius: 12px;
      padding: 14px 20px; min-width: 280px; max-width: 400px;
      box-shadow: 0 0 30px rgba(99,102,241,0.3); pointer-events: auto;
      animation: toast-in 0.4s ease-out; transition: all 0.3s;
    }
    .toast.removing { animation: toast-out 0.3s ease-in forwards; }
    .toast-title { font-size: 13px; font-weight: 700; color: var(--primary-light); margin-bottom: 4px; }
    .toast-body { font-size: 12px; color: var(--text-secondary); }
    @keyframes toast-in { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toast-out { to { opacity: 0; transform: translateX(100px); } }

    /* ========== 登录页 ========== */
    .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; position: relative; background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.1) 0%, transparent 60%); }

    /* 背景动画粒子 */
    .bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .bg-particles canvas { width: 100%; height: 100%; }

    /* 水波纹效果容器 */
    .ripple-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
    .ripple { position: absolute; border-radius: 50%; border: 2px solid rgba(99, 102, 241, 0.4); animation: ripple-expand 2s ease-out forwards; pointer-events: none; }
    @keyframes ripple-expand {
      0% { width: 0; height: 0; opacity: 1; transform: translate(-50%, -50%); }
      100% { width: 600px; height: 600px; opacity: 0; transform: translate(-50%, -50%); }
    }

    .login-box {
      background: rgba(26, 26, 62, 0.85);
      backdrop-filter: blur(20px);
      padding: 48px 40px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(99, 102, 241, 0.15), 0 0 120px rgba(99, 102, 241, 0.05);
      width: 420px;
      position: relative;
      z-index: 10;
      animation: float-in 0.8s ease-out;
    }
    @keyframes float-in {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* 睦邻云印标题 */
    .brand-title {
      text-align: center;
      margin-bottom: 8px;
      font-family: "Noto Serif SC", "STKaiti", "KaiTi", serif;
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #c084fc, #818cf8, #60a5fa, #818cf8, #c084fc);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 4s ease infinite;
      letter-spacing: 8px;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(129, 140, 248, 0.4));
    }
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .brand-sub {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 36px;
      letter-spacing: 4px;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text);
      font-size: 14px; outline: none; transition: all 0.3s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px var(--glow); }
    .form-group input::placeholder { color: #4a4a7a; }

    .btn {
      padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 600; transition: all 0.3s; position: relative; overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; width: 100%; font-size: 16px;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }
    .btn-primary:hover { box-shadow: 0 4px 30px rgba(99, 102, 241, 0.6); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* 按钮水波纹 */
    .btn-ripple {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,0.3);
      transform: scale(0); animation: btn-ripple 0.6s ease-out;
    }
    @keyframes btn-ripple {
      to { transform: scale(4); opacity: 0; }
    }

    .btn-sm { padding: 7px 16px; font-size: 13px; border-radius: 8px; width: auto; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-warning { background: var(--warning); color: #fff; }
    .btn-ghost { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: var(--primary-light); }
    .error-msg { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; }

    /* ========== 主布局 ========== */
    .app { display: none; }
    .app.active { display: flex; min-height: 100vh; }

    .sidebar {
      width: 240px; background: linear-gradient(180deg, #12122e 0%, #1a1a3e 100%);
      border-right: 1px solid var(--border); padding: 24px 0; flex-shrink: 0;
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
    }
    .sidebar .logo {
      padding: 0 20px; margin-bottom: 32px; text-align: center;
    }
    .sidebar .logo h2 {
      font-family: "Noto Serif SC", "STKaiti", serif;
      font-size: 24px; font-weight: 900;
      background: linear-gradient(135deg, #c084fc, #818cf8, #60a5fa, #818cf8, #c084fc);
      background-size: 300% 300%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: gradient-shift 4s ease infinite;
      letter-spacing: 4px;
    }
    .sidebar .org-name { padding: 0 20px; font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 4px; }
    .sidebar nav { margin-top: 16px; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 24px; color: var(--text-secondary);
      text-decoration: none; font-size: 14px; transition: all 0.2s;
      border-left: 3px solid transparent; margin-bottom: 2px;
    }
    .sidebar nav a:hover { background: rgba(99, 102, 241, 0.08); color: var(--text); }
    .sidebar nav a.active {
      background: rgba(99, 102, 241, 0.12); color: #fff;
      border-left-color: var(--primary-light);
    }
    .sidebar nav a .icon { font-size: 18px; width: 24px; text-align: center; }
    .sidebar .spacer { flex: 1; }
    .sidebar .user-info { padding: 12px 24px; border-top: 1px solid var(--border); margin-top: 12px; }
    .sidebar .user-info .user-name { font-size: 13px; color: var(--text); margin-bottom: 6px; }
    .sidebar .user-info .user-role { font-size: 11px; color: var(--text-secondary); }
    .sidebar .logout { padding: 8px 24px; }
    .sidebar .logout a { color: var(--text-secondary); text-decoration: none; font-size: 13px; transition: color 0.2s; }
    .sidebar .logout a:hover { color: var(--danger); }

    .main { flex: 1; padding: 28px 36px; overflow-y: auto; background: var(--bg); margin-left: 240px; min-height: 100vh; }
    .main h2 { margin-bottom: 24px; font-size: 22px; font-weight: 700; }

    /* 统计卡片 */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--bg-card); padding: 22px; border-radius: var(--radius);
      border: 1px solid var(--border); transition: all 0.3s; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0; transition: opacity 0.3s;
    }
    .stat-card:hover { border-color: var(--primary); box-shadow: 0 0 25px var(--glow); transform: translateY(-3px); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card .num { font-size: 30px; font-weight: 800; color: var(--primary-light); line-height: 1.2; }
    .stat-card .label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .stat-card .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; opacity: 0.7; }

    /* 图表网格 */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .chart-grid-full { grid-column: 1 / -1; }
    @media (max-width: 1200px) { .chart-grid { grid-template-columns: 1fr; } }

    /* 卡片 */
    .card {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 22px; margin-bottom: 20px;
      transition: all 0.3s;
    }
    .card:hover { border-color: rgba(99,102,241,0.4); box-shadow: 0 0 20px rgba(99,102,241,0.1); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .card-header h3 { font-size: 16px; font-weight: 600; }

    /* 打印机卡片网格 */
    .printer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .printer-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; transition: all 0.3s; position: relative; overflow: hidden;
    }
    .printer-card:hover { border-color: var(--primary); box-shadow: 0 0 25px var(--glow); transform: translateY(-2px); }
    .printer-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .printer-card-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .printer-card-status { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .status-dot.online { background: var(--success); animation: breathe 2s ease-in-out infinite; box-shadow: 0 0 8px rgba(16,185,129,0.6); }
    .status-dot.offline { background: #4a4a6a; }
    .status-dot.busy { background: var(--warning); animation: breathe 1.5s ease-in-out infinite; box-shadow: 0 0 8px rgba(245,158,11,0.6); }
    .status-dot.error { background: var(--danger); animation: breathe 1s ease-in-out infinite; box-shadow: 0 0 8px rgba(239,68,68,0.6); }
    @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .printer-card-info { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
    .printer-card-info span { display: block; }
    .printer-card-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.05); }

    /* 用户排行 */
    .rank-list { list-style: none; }
    .rank-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 12px; }
    .rank-item:last-child { border-bottom: none; }
    .rank-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .rank-num.top { background: linear-gradient(135deg, #f59e0b, #f97316); color: #fff; }
    .rank-num.normal { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
    .rank-name { flex: 1; font-size: 14px; }
    .rank-count { font-size: 14px; font-weight: 700; color: var(--primary-light); }
    .rank-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; margin: 0 12px; }
    .rank-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary), var(--primary-light)); transition: width 0.6s ease; }

    /* 表格 */
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 11px 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; white-space: nowrap; }
    th { font-weight: 600; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-online { background: rgba(16,185,129,0.15); color: var(--success); }
    .badge-offline { background: rgba(148,163,184,0.15); color: var(--text-secondary); }
    .badge-busy { background: rgba(245,158,11,0.15); color: var(--warning); }
    .badge-error { background: rgba(239,68,68,0.15); color: var(--danger); }
    .badge-pending { background: rgba(99,102,241,0.15); color: var(--primary-light); }
    .badge-completed { background: rgba(16,185,129,0.15); color: var(--success); }
    .badge-failed { background: rgba(239,68,68,0.15); color: var(--danger); }
    .badge-printing, .badge-sending { background: rgba(245,158,11,0.15); color: var(--warning); }

    .print-settings { display: flex; gap: 4px; flex-wrap: wrap; }
    .print-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.06); color: var(--text-secondary); }

    .mono { font-family: "SF Mono", Consolas, monospace; font-size: 11px; background: rgba(255,255,255,0.06); padding: 3px 8px; border-radius: 6px; color: var(--primary-light); }

    /* 模态框 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 440px; max-width: 90vw; box-shadow: 0 0 60px rgba(0,0,0,0.5); animation: float-in 0.3s ease-out; }
    .modal h3 { margin-bottom: 18px; font-size: 18px; }
    .modal .form-group input, .modal .form-group select { background: rgba(255,255,255,0.08); }
    .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }

    .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
    .page-nav { display: flex; gap: 8px; justify-content: center; margin-top: 18px; align-items: center; }

    /* WS状态指示 */
    .ws-indicator { display: flex; align-items: center; gap: 6px; padding: 8px 20px; font-size: 11px; color: var(--text-secondary); }
    .ws-dot { width: 6px; height: 6px; border-radius: 50%; background: #4a4a6a; transition: background 0.3s; }
    .ws-dot.connected { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,0.5); }

    /* 全局动画 */
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px var(--glow); } 50% { box-shadow: 0 0 40px var(--glow); } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fade-in 0.4s ease-out; }
  </style>
</head>
<body>

<!-- 背景水波纹层 -->
<div class="ripple-container" id="rippleContainer"></div>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- 登录页 -->
<div class="login-wrapper" id="loginPage">
  <div class="login-box">
    <div class="brand-title">睦邻云印</div>
    <div class="brand-sub">跨网段云打印服务</div>
    <div class="form-group">
      <label>组织码</label>
      <input type="text" id="loginOrgCode" placeholder="请输入组织邀请码" autocomplete="off">
    </div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="请输入密码">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">登 录</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- 主应用 -->
<div class="app" id="app">
  <div class="sidebar">
    <div class="logo">
      <h2>睦邻云印</h2>
      <div class="org-name" id="sidebarOrg"></div>
    </div>
    <nav>
      <a href="#" class="active" data-page="dashboard"><span class="icon">&#9671;</span> 仪表盘</a>
      <a href="#" data-page="printers"><span class="icon">&#9114;</span> 打印机管理</a>
      <a href="#" data-page="users"><span class="icon">&#9823;</span> 用户管理</a>
      <a href="#" data-page="jobs"><span class="icon">&#9776;</span> 打印记录</a>
      <a href="#" data-page="orgs"><span class="icon">&#9733;</span> 组织管理</a>
    </nav>
    <div class="spacer"></div>
    <div class="ws-indicator"><div class="ws-dot" id="wsDot"></div><span id="wsLabel">未连接</span></div>
    <div class="user-info" id="sidebarUser"></div>
    <div class="logout"><a href="#" onclick="logout()">退出登录</a></div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<!-- 模态框 -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ========== 水波纹效果 ==========
document.addEventListener('click', (e) => {
  const container = document.getElementById('rippleContainer');
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = e.clientX + 'px';
  ripple.style.top = e.clientY + 'px';
  container.appendChild(ripple);
  setTimeout(() => ripple.remove(), 2000);
});

// 按钮水波纹
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'btn-ripple';
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
});

// ========== Toast ==========
function showToast(title, body, duration = 4000) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<div class="toast-title">${esc(title)}</div><div class="toast-body">${esc(body)}</div>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('removing');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ========== API ==========
const API = window.location.origin + '/api';
let token = localStorage.getItem('cp_token');
let currentUser = JSON.parse(localStorage.getItem('cp_user') || 'null');
let currentOrg = JSON.parse(localStorage.getItem('cp_org') || 'null');
let currentPage = 'dashboard';
let ws = null;
let chartInstances = {};

async function doLogin() {
  const orgCode = document.getElementById('loginOrgCode').value.trim();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent = '';
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, orgCode })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    token = data.token;
    currentUser = data.user;
    currentOrg = data.org;
    localStorage.setItem('cp_token', token);
    localStorage.setItem('cp_user', JSON.stringify(currentUser));
    localStorage.setItem('cp_org', JSON.stringify(currentOrg));
    showApp();
  } catch (e) {
    document.getElementById('loginError').textContent = e.message;
  }
}

function logout() {
  token = null; currentUser = null; currentOrg = null;
  localStorage.removeItem('cp_token');
  localStorage.removeItem('cp_user');
  localStorage.removeItem('cp_org');
  if (ws) { ws.close(); ws = null; }
  destroyAllCharts();
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginPage').style.display = 'flex';
  updateWsStatus(false);
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('sidebarOrg').textContent = currentOrg?.name || '';
  document.getElementById('sidebarUser').innerHTML = `
    <div class="user-name">${esc(currentUser?.username || '')}</div>
    <div class="user-role">${roleText(currentUser?.role)}</div>`;
  loadPage('dashboard');
  connectWebSocket();
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...opts.headers }
  });
  if (res.status === 401) { logout(); throw new Error('登录已过期'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

// ========== WebSocket ==========
function connectWebSocket() {
  if (ws) { ws.close(); }
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${location.host}/ws?token=${token}&type=client`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => { updateWsStatus(true); };
  ws.onclose = () => {
    updateWsStatus(false);
    if (token) setTimeout(connectWebSocket, 5000);
  };
  ws.onerror = () => { updateWsStatus(false); };
  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      handleWsMessage(msg);
    } catch(e) {}
  };
}

function updateWsStatus(connected) {
  const dot = document.getElementById('wsDot');
  const label = document.getElementById('wsLabel');
  if (dot) { dot.className = 'ws-dot' + (connected ? ' connected' : ''); }
  if (label) { label.textContent = connected ? '已连接' : '未连接'; }
}

function handleWsMessage(msg) {
  if (msg.type === 'job_update') {
    if (currentPage === 'dashboard') loadPage('dashboard');
    if (currentPage === 'jobs') loadPage('jobs');
  }
  if (msg.type === 'new_job') {
    showToast('新打印任务', `${msg.data?.filename || '新文件'} - ${msg.data?.username || ''}`);
    if (currentPage === 'dashboard') loadPage('dashboard');
  }
  if (msg.type === 'printer_status') {
    if (currentPage === 'printers') loadPage('printers');
    if (currentPage === 'dashboard') loadPage('dashboard');
  }
}

// ========== Chart.js 工具 ==========
function destroyAllCharts() {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
  chartInstances = {};
}

function destroyChart(id) {
  if (chartInstances[id]) {
    try { chartInstances[id].destroy(); } catch(e) {}
    delete chartInstances[id];
  }
}

const chartColors = {
  primary: '#818cf8', primaryBg: 'rgba(129,140,248,0.15)',
  success: '#10b981', successBg: 'rgba(16,185,129,0.15)',
  danger: '#ef4444', dangerBg: 'rgba(239,68,68,0.15)',
  warning: '#f59e0b', warningBg: 'rgba(245,158,11,0.15)',
  info: '#38bdf8', infoBg: 'rgba(56,189,248,0.15)',
  purple: '#a78bfa', purpleBg: 'rgba(167,139,250,0.15)',
  pink: '#f472b6', pinkBg: 'rgba(244,114,182,0.15)',
};

const chartGridColor = 'rgba(255,255,255,0.06)';
const chartTickColor = '#64748b';

function defaultChartOptions(title) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color: '#94a3b8', font: { size: 12 }, padding: 16, usePointStyle: true } },
      title: { display: !!title, text: title, color: '#e2e8f0', font: { size: 14, weight: '600' }, padding: { bottom: 16 } }
    },
    scales: {
      x: { grid: { color: chartGridColor }, ticks: { color: chartTickColor, font: { size: 11 } } },
      y: { grid: { color: chartGridColor }, ticks: { color: chartTickColor, font: { size: 11 } }, beginAtZero: true }
    }
  };
}

function renderDailyChart(data) {
  const ctx = document.getElementById('chartDaily');
  if (!ctx) return;
  destroyChart('daily');
  const labels = (data || []).map(d => {
    const dt = new Date(d.date);
    return (dt.getMonth()+1) + '/' + dt.getDate();
  });
  const opts = defaultChartOptions();
  opts.plugins.legend.position = 'top';
  opts.interaction = { mode: 'index', intersect: false };
  chartInstances['daily'] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '总数', data: (data||[]).map(d => d.total || 0), borderColor: chartColors.primary, backgroundColor: chartColors.primaryBg, fill: true, tension: 0.4, pointRadius: 3, pointHoverRadius: 6 },
        { label: '完成', data: (data||[]).map(d => d.completed || 0), borderColor: chartColors.success, backgroundColor: chartColors.successBg, fill: true, tension: 0.4, pointRadius: 3, pointHoverRadius: 6 },
        { label: '失败', data: (data||[]).map(d => d.failed || 0), borderColor: chartColors.danger, backgroundColor: chartColors.dangerBg, fill: true, tension: 0.4, pointRadius: 3, pointHoverRadius: 6 },
      ]
    },
    options: opts
  });
}

function renderPrinterChart(data) {
  const ctx = document.getElementById('chartPrinters');
  if (!ctx) return;
  destroyChart('printers');
  const labels = (data || []).map(d => d.name || d.printer_name || '未知');
  const values = (data || []).map(d => d.count || d.job_count || 0);
  const bgColors = [chartColors.primary, chartColors.success, chartColors.warning, chartColors.info, chartColors.purple, chartColors.pink, chartColors.danger];
  const opts = defaultChartOptions();
  opts.plugins.legend.display = false;
  opts.indexAxis = 'y';
  chartInstances['printers'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: values.map((_, i) => bgColors[i % bgColors.length] + '80'),
        borderColor: values.map((_, i) => bgColors[i % bgColors.length]),
        borderWidth: 1, borderRadius: 4, barPercentage: 0.6
      }]
    },
    options: opts
  });
}

function renderHourlyChart(data) {
  const ctx = document.getElementById('chartHourly');
  if (!ctx) return;
  destroyChart('hourly');
  const hours = (data || []).map(d => d.hour + '时');
  const values = (data || []).map(d => d.count || 0);
  const pieColors = ['#818cf8','#10b981','#f59e0b','#38bdf8','#a78bfa','#f472b6','#ef4444','#06b6d4','#84cc16','#e879f9','#fb923c','#22d3ee',
    '#818cf8','#10b981','#f59e0b','#38bdf8','#a78bfa','#f472b6','#ef4444','#06b6d4','#84cc16','#e879f9','#fb923c','#22d3ee'];

  const hasData = values.some(v => v > 0);
  if (!hasData) {
    ctx.parentElement.innerHTML = '<div class="empty" style="padding:20px">今日暂无打印数据</div>';
    return;
  }
  chartInstances['hourly'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: hours,
      datasets: [{
        data: values,
        backgroundColor: pieColors.map(c => c + 'cc'),
        borderColor: '#1a1a3e',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 11 }, padding: 6, usePointStyle: true, boxWidth: 8 } }
      },
      cutout: '55%'
    }
  });
}

function renderUserRank(data) {
  const container = document.getElementById('userRankList');
  if (!container) return;
  const users = (data || []).slice(0, 10);
  if (users.length === 0) {
    container.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  const maxCount = Math.max(...users.map(u => u.count || u.job_count || 0), 1);
  container.innerHTML = `<ul class="rank-list">${users.map((u, i) => {
    const count = u.count || u.job_count || 0;
    const pct = (count / maxCount * 100).toFixed(0);
    return `<li class="rank-item">
      <span class="rank-num ${i < 3 ? 'top' : 'normal'}">${i + 1}</span>
      <span class="rank-name">${esc(u.username || u.name || '未知')}</span>
      <div class="rank-bar"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
      <span class="rank-count">${count}</span>
    </li>`;
  }).join('')}</ul>`;
}

        1. 将 <strong style="color:var(--text)">组织码</strong> 提供给打印机主机端和客户端<br>
        2. 主机端：填入"主机密钥"连接打印机<br>
        3. 客户端：用组织码 + 账号密码登录<br>
        4. 不同组织完全隔离，互不可见
      </p>
    </div>`;
}

function showAddOrg() {
  showModal(`<h3>新建组织</h3>
    <div class="form-group"><label>组织名称</label><input type="text" id="orgName" placeholder="如：鱼巷口社区"></div>
    <div class="actions"><button class="btn btn-sm btn-ghost" onclick="hideModal()">取消</button><button class="btn btn-sm btn-primary" onclick="addOrg()">创建</button></div>`);
}

async function addOrg() {
  const name = document.getElementById('orgName').value.trim();
  if (!name) return;
  const org = await api('/orgs', { method: 'POST', body: JSON.stringify({ name }) });
  hideModal();
  showModal(`<h3>创建成功</h3>
    <p style="margin:12px 0">组织码：<code class="mono" style="font-size:20px">${org.code}</code></p>
    <p style="font-size:13px;color:var(--text-secondary)">请分发给需要使用该组织打印服务的人员</p>
    <div class="actions"><button class="btn btn-sm btn-primary" onclick="hideModal();loadPage('orgs')">知道了</button></div>`);
}

// ========== 工具 ==========
function showModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('modal').classList.add('active'); }
function hideModal() { document.getElementById('modal').classList.remove('active'); }
document.getElementById('modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) hideModal(); });

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function truncate(s, n) { if (!s) return ''; return s.length > n ? s.substring(0, n) + '...' : s; }
function statusText(s) { return { online:'在线', offline:'离线', busy:'忙碌', error:'异常' }[s] || s || '离线'; }
function jobStatusText(s) { return { pending:'等待中', sending:'发送中', printing:'打印中', completed:'已完成', failed:'失败' }[s] || s; }
function roleText(r) { return { admin:'超级管理员', manager:'管理员', user:'普通用户' }[r] || r; }
function fileSize(b) { if (!b) return '-'; if (b < 1024) return b + 'B'; if (b < 1048576) return (b/1024).toFixed(1) + 'KB'; return (b/1048576).toFixed(1) + 'MB'; }
function copyText(t) { navigator.clipboard.writeText(t).then(() => showToast('已复制', t)).catch(() => prompt('请手动复制', t)); }

document.getElementById('loginPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginOrgCode').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('loginUsername').focus(); });
document.getElementById('loginUsername').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('loginPassword').focus(); });

if (token && currentUser) { showApp(); } else { document.getElementById('loginPage').style.display = 'flex'; }
</script>
